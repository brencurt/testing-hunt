# docker-compose.yml — local development and production orchestration
#
# To start everything: docker-compose up --build
# To stop:            docker-compose down
#
# DevOps concepts in this file:
#   - "services" = separate containers (like Kubernetes Pods)
#   - "depends_on" = startup ordering (like Kubernetes initContainers)
#   - "healthcheck" = readiness/liveness probes (maps directly to K8s probes)
#   - "volumes" = mount files from host into container
#   - "networks" = isolated container-to-container networking

services:

  # ── Backend (Node.js + Express API) ─────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "3001:3001"   # host:container — exposes for local curl/Postman testing
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ALLOWED_ORIGIN=https://luisina.duckdns.org
    volumes:
      # Mount game config from host so you can edit it without rebuilding
      - ./backend/config/game.json:/app/config/game.json:ro
      # Mount images directory
      - ./backend/public/images:/app/public/images:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Pass empty string so api.js uses relative URLs (Nginx proxies /api/)
        VITE_API_URL: ""
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificates from host (generated by certbot before docker-compose up)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy   # Wait until backend passes health check
    restart: unless-stopped

networks:
  default:
    name: hunt-network
