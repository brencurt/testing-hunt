# Nginx config for the frontend container.
# Two jobs:
#   1. Serve the React build as static files (SPA routing with try_files)
#   2. Proxy /api/ and /images/ requests to the backend container

# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS — full app
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/luisina.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luisina.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: any route that doesn't match a real file
    # falls back to index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy image requests to the backend's static file server.
    location ^~ /images/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
    }

    # Cache static assets aggressively (JS/CSS have hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
